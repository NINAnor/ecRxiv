# Quarto project root for this repository. Ensures renders of R/*.qmd use the
# project directory so renv (.Rprofile + renv/activate.R) applies to R subprocesses.
project:
  type: default

execute:
  execute-dir: project
  # Avoid freeze copy errors for documents under R/ when execute-dir is project
  # (missing R/<doc>_files/execute-results/html.json vs .quarto/_freeze/...).
  freeze: false
